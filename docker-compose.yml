# Lancement de Jarvis en une commande :  docker compose up --build
# Puis ouvrir http://localhost:8000  (admin : http://localhost:8000/#admin)
#
# Exposition publique (Mac Studio) via Cloudflare Tunnel :
#   docker compose --profile tunnel up -d --build
# (nécessite TUNNEL_TOKEN dans .env — voir .env.example et le README)
services:
  jarvis:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Optionnels — laissés vides par défaut (le dashboard tourne sans).
      # RAG via Claude (sinon mode "stub" hors-ligne) :
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Tickets Everping réels (sinon échantillon anonymisé) :
      EVERPING_REFRESH_TOKEN: ${EVERPING_REFRESH_TOKEN:-}
      EVERPING_CLIENT_ID: ${EVERPING_CLIENT_ID:-}
      # Supervision via Uptime Kuma (sinon sondes locales) :
      UPTIME_KUMA_BASE_URL: ${UPTIME_KUMA_BASE_URL:-}
      # … via clé API (endpoint /metrics) :
      UPTIME_KUMA_API_KEY: ${UPTIME_KUMA_API_KEY:-}
      # … ou via une page de statut publique :
      UPTIME_KUMA_STATUS_SLUG: ${UPTIME_KUMA_STATUS_SLUG:-}
    volumes:
      # Persistance des données éditables (projets, supervision, base docs).
      # Sans ce montage, les modifs faites via l'admin sont DANS l'image et
      # donc écrasées à chaque `docker compose up --build`. Le montage relie le
      # dossier de l'hôte : les modifs survivent aux rebuilds et restent visibles.
      - ./backend/data:/app/backend/data
    restart: unless-stopped

  # Tunnel Cloudflare — n'est lancé qu'avec le profil "tunnel".
  # Dans le dashboard Cloudflare Zero Trust, route ton hostname public vers
  # le service  http://jarvis:8000  (ce conteneur le joint par le réseau Compose).
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - jarvis
    profiles:
      - tunnel
